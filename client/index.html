<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="NexEditor — Real-time collaborative code editor powered by CRDTs and WebSockets. Open a room, share the link, and code together instantly." />
  <title>NexEditor — Real-Time Collaborative Editor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <script src="/socket.io/socket.io.js"></script>


  <script type="importmap">
    {
      "imports": {
        "yjs":                        "https://esm.sh/yjs@13",
        "y-protocols/awareness.js":   "https://esm.sh/y-protocols@1/awareness.js",
        "codemirror":                 "https://esm.sh/codemirror@6.0.1",
        "@codemirror/view":           "https://esm.sh/@codemirror/view@6",
        "@codemirror/state":          "https://esm.sh/@codemirror/state@6",
        "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6",
        "@codemirror/lang-javascript":"https://esm.sh/@codemirror/lang-javascript@6",
        "y-codemirror.next":          "https://esm.sh/y-codemirror.next@0.3.5"
      }
    }
    </script>

  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>

<body>
  <!-- Global Background Particle Canvas & Accent Lines -->
  <canvas id="particle-canvas"></canvas>
  <div class="accent-line line-horizontal"></div>
  <div class="accent-line line-vertical"></div>

  <!-- Authentication Landing Page -->
  <div id="auth-page">
    <header class="auth-header">
      <span class="auth-logo">NEXEDITOR</span>
      <button class="btn-contact" id="btn-contact">Contact</button>
    </header>

    <div class="auth-card-container">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab-btn active" data-tab="signin">Sign In</button>
          <button class="auth-tab-btn" data-tab="signup">Create Account</button>
        </div>

        <div class="auth-tab-content active" id="tab-signin">
          <form id="form-signin" autocomplete="off" novalidate>
            <div class="input-group">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </span>
              <input type="email" id="signin-email" placeholder="Email Address" required />
            </div>
            
            <div class="input-group">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </span>
              <input type="password" id="signin-password" placeholder="Password" required />
            </div>

            <div class="auth-controls">
              <label class="checkbox-container">
                <input type="checkbox" id="signin-remember" />
                <span class="checkbox-checkmark"></span>
                <span class="checkbox-label">Remember me</span>
              </label>
              <a href="#" class="forgot-link" id="link-forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn-continue">Continue</button>
          </form>
        </div>

        <div class="auth-tab-content" id="tab-signup" style="display: none;">
          <form id="form-signup" autocomplete="off" novalidate>
            <div class="input-group">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </span>
              <input type="text" id="signup-name" placeholder="Display Name" required />
            </div>
            
            <div class="input-group">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </span>
              <input type="email" id="signup-email" placeholder="Email Address" required />
            </div>
            
            <div class="input-group">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </span>
              <input type="password" id="signup-password" placeholder="Password" required />
            </div>

            <button type="submit" class="btn-continue">Create Account</button>
          </form>
        </div>

        <div class="auth-divider">
          <span>OR</span>
        </div>

        <div class="oauth-buttons">
          <button class="btn-oauth btn-oauth-google-full" id="btn-oauth-google">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.51 0-6.355-2.845-6.355-6.355s2.845-6.355 6.355-6.355c1.583 0 3.018.577 4.129 1.526l3.197-3.197C19.296 2.227 15.96 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-11 0-.746-.08-1.468-.222-2.195H12.24z"/>
            </svg>
            Continue with Google
          </button>
        </div>

        <button class="btn-guest" id="btn-guest-access">Continue as Anonymous Guest</button>
      </div>
    </div>
  </div>

  <div id="landing-page" style="display: none;">
    <div class="landing-card">
      <div class="landing-user-bar">
        <span class="landing-user-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </span>
        <span class="landing-username" id="landing-username">Loading...</span>
        <button class="btn-logout" id="btn-logout-landing">Sign Out</button>
      </div>

      <h1 class="landing-title">&lt;/&gt; NexEditor</h1>
      <p class="landing-subtitle">Real-time collaborative text editing at the speed of your thoughts.</p>

      <div class="landing-actions">
        <button id="btn-create-room" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Create New Room
        </button>

        <div class="landing-divider"><span>OR</span></div>

        <div class="join-room-form">
          <input type="text" id="input-room-id" placeholder="Enter Room ID" autocomplete="off" spellcheck="false" />
          <button id="btn-join-room" class="btn-secondary">Join</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app-container" style="display: none;">
    <header id="header" role="banner">
      <div class="header-left">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 6L3 12L8 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M16 6L21 12L16 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M13 4L11 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <span class="logo-text">NexEditor</span>
        </div>
        <div class="connection-badge" id="connection-badge" aria-live="polite">
          <span class="connection-dot" id="connection-dot"></span>
          <span class="connection-label" id="connection-label">Connecting…</span>
        </div>
      </div>

      <div class="header-center">
        <div class="room-pill" aria-label="Current room ID">
          <span class="room-label">ROOM</span>
          <span class="room-id-text" id="room-id-display">—</span>
        </div>
      </div>

      <div class="header-right">
        <button id="copy-btn" aria-label="Copy room ID to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2" />
            <path d="M5 15H4C2.89543 15 2 14.1046 2 13V4C2 2.89543 2.89543 2 4 2H13C14.1046 2 15 2.89543 15 4V5"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          Copy Room ID
        </button>
        <button id="btn-logout-editor" class="btn-logout" aria-label="Sign out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </div>
    </header>

    <main id="main" role="main">

      <div id="editor-wrapper">
        <div id="editor" aria-label="Collaborative code editor"></div>
      </div>

      <aside id="sidebar" aria-label="Active users panel">
        <div class="sidebar-header">
          <span class="sidebar-title">Active Users</span>
          <span class="user-count" id="user-count">0</span>
        </div>
        <div id="user-list" role="list" aria-label="List of connected users">
        </div>
      </aside>

    </main>
  </div>

  <script type="module" src="./ui.js"></script>

</body>

</html>
